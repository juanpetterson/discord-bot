<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clip Editor</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px;
    }
    .container { width: 100%; max-width: 900px; }
    h1 { font-size: 1.5rem; margin-bottom: 8px; color: #5865f2; }
    .subtitle { font-size: 0.85rem; color: #888; margin-bottom: 24px; }
    .card {
      background: #16213e;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 16px;
      border: 1px solid #2a2a4a;
    }
    label {
      display: block;
      font-size: 0.85rem;
      color: #aaa;
      margin-bottom: 6px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    select, button, input { font-family: inherit; font-size: 0.95rem; }
    select, input[type="text"] {
      width: 100%;
      padding: 10px 12px;
      background: #0f3460;
      color: #e0e0e0;
      border: 1px solid #3a3a6a;
      border-radius: 8px;
      cursor: pointer;
      outline: none;
    }
    select:focus, input[type="text"]:focus { border-color: #5865f2; }
    input[type="text"]::placeholder { color: #666; }
    #waveform {
      margin: 16px 0;
      border-radius: 8px;
      overflow: hidden;
      min-height: 128px;
      background: #0d1b3e;
    }
    .time-display { display: flex; justify-content: space-between; gap: 16px; margin-top: 12px; }
    .time-box {
      flex: 1;
      background: #0f3460;
      border-radius: 8px;
      padding: 12px;
      text-align: center;
    }
    .time-box .label {
      font-size: 0.7rem;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 4px;
    }
    .time-box .value {
      font-size: 1.4rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      color: #fff;
    }
    .time-box.start .value { color: #57f287; }
    .time-box.end .value { color: #ed4245; }
    .time-box.duration .value { color: #fee75c; }
    input.time-input {
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      outline: none;
      text-align: center;
      width: 100%;
      padding: 0;
      cursor: text;
      transition: border-color 0.15s;
    }
    .time-box.start input.time-input:focus { border-bottom-color: #57f287; }
    .time-box.end input.time-input:focus { border-bottom-color: #ed4245; }
    input.time-input:hover { border-bottom-color: #555; }
    .controls { display: flex; gap: 12px; margin-top: 16px; flex-wrap: wrap; }
    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.9rem;
      transition: opacity 0.2s, transform 0.1s;
    }
    .btn:hover { opacity: 0.9; }
    .btn:active { transform: scale(0.97); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-preview { background: #5865f2; color: #fff; }
    .btn-stop { background: #4f545c; color: #fff; }
    .btn-download { background: #57f287; color: #1a1a2e; }
    .btn-upload { background: #5865f2; color: #fff; }
    .spacer { flex: 1; }
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.7);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: #16213e;
      border: 1px solid #2a2a4a;
      border-radius: 12px;
      padding: 24px;
      width: 100%;
      max-width: 400px;
    }
    .modal h3 { margin-bottom: 16px; color: #5865f2; }
    .modal input[type="text"] {
      width: 100%;
      padding: 10px 12px;
      background: #0f3460;
      color: #e0e0e0;
      border: 1px solid #3a3a6a;
      border-radius: 8px;
      margin-bottom: 12px;
      outline: none;
      font-family: inherit;
      font-size: 0.95rem;
    }
    .modal input[type="text"]:focus { border-color: #5865f2; }
    .modal-buttons { display: flex; gap: 12px; justify-content: flex-end; margin-top: 8px; }
    .btn-cancel { background: #4f545c; color: #fff; }
    .status {
      margin-top: 16px;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.85rem;
      display: none;
    }
    .status.success { display: block; background: #1a6b3c; color: #57f287; }
    .status.error { display: block; background: #6b1a1a; color: #ed4245; }
    .status.info { display: block; background: #1a3a6b; color: #5865f2; }
    .loading { text-align: center; padding: 40px; color: #888; }
    .loading .spinner {
      display: inline-block;
      width: 28px;
      height: 28px;
      border: 3px solid #3a3a6a;
      border-top-color: #5865f2;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .hint { font-size: 0.78rem; color: #666; margin-top: 8px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎛️ Clip Editor</h1>
    <p class="subtitle" id="info-text">Loading clip data...</p>

    <div class="card">
      <label for="track-select">Track</label>
      <select id="track-select" disabled>
        <option>Loading...</option>
      </select>
    </div>

    <div class="card">
      <label>Waveform</label>
      <div id="waveform">
        <div class="loading" id="waveform-loading">
          <div class="spinner"></div>
          <div>Loading audio...</div>
        </div>
      </div>

      <div class="time-display">
        <div class="time-box start">
          <div class="label">Start</div>
          <input class="value time-input" id="time-start" type="text" value="00:00.0" spellcheck="false" />
        </div>
        <div class="time-box end">
          <div class="label">End</div>
          <input class="value time-input" id="time-end" type="text" value="00:00.0" spellcheck="false" />
        </div>
        <div class="time-box duration">
          <div class="label">Selection</div>
          <div class="value" id="time-selection">00:00.0</div>
        </div>
      </div>
      <p class="hint">Drag handles or type a time (MM:SS.D) to set trim points.</p>
    </div>

    <div class="card">
      <div class="controls">
        <button class="btn btn-preview" id="btn-preview" disabled>▶ Preview Selection</button>
        <button class="btn btn-stop" id="btn-stop" disabled>⏹ Stop</button>
        <div class="spacer"></div>
        <button class="btn btn-upload" id="btn-upload" disabled>⬆ Upload as Sound</button>
        <button class="btn btn-download" id="btn-download" disabled>⬇ Download Trimmed</button>
      </div>
      <div class="status" id="status-msg"></div>
    </div>
  </div>

  <div class="modal-overlay" id="upload-modal">
    <div class="modal">
      <h3>⬆ Upload as Sound</h3>
      <label for="upload-author">Author</label>
      <input type="text" id="upload-author" placeholder="e.g. dw" maxlength="50">
      <label for="upload-name">Sound Name</label>
      <input type="text" id="upload-name" placeholder="e.g. tananana nananan" maxlength="100">
      <div class="modal-buttons">
        <button class="btn btn-cancel" id="upload-cancel">Cancel</button>
        <button class="btn btn-upload" id="upload-confirm">Upload</button>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/wavesurfer.js@7/dist/wavesurfer.min.js"></script>
  <script src="https://unpkg.com/wavesurfer.js@7/dist/plugins/regions.min.js"></script>
  <!-- ffmpeg.wasm (UMD) — pinned. Requires COOP/COEP headers (set in vercel.json) for SharedArrayBuffer threading. -->
  <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.12.10/dist/umd/ffmpeg.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@ffmpeg/util@0.12.1/dist/umd/index.js" crossorigin="anonymous"></script>
  <!-- JSZip for unpacking the clip bundle (one ZIP attachment instead of N per-track audio attachments). -->
  <script src="https://unpkg.com/jszip@3.10.1/dist/jszip.min.js" crossorigin="anonymous"></script>
  <script>
    let wavesurfer = null;
    let regionsPlugin = null;
    let activeRegion = null;
    let tracks = []; // legacy: [{label, url, filename}]  /  new ZIP: [{label, filename, bytes, mime, ext}]
    let currentAudioBuffer = null;
    let currentSourceBytes = null;   // Uint8Array of the original encoded audio
    let currentSourceMime = null;    // e.g. "audio/mpeg"
    let currentSourceExt = null;     // e.g. "mp3"
    let currentBlobUrl = null;       // object URL fed to WaveSurfer when bytes are in-memory
    let clipChannelId = null;
    let clipMessageId = null;
    let clipSignature = null;

    // ffmpeg.wasm singleton
    let ffmpegInstance = null;
    let ffmpegLoading = null;
    async function getFfmpeg() {
      if (ffmpegInstance) return ffmpegInstance;
      if (ffmpegLoading) return ffmpegLoading;
      ffmpegLoading = (async () => {
        const FFmpegCtor = (window.FFmpegWASM && window.FFmpegWASM.FFmpeg) || (window.FFmpeg && window.FFmpeg.FFmpeg);
        if (!FFmpegCtor) throw new Error('ffmpeg.wasm not loaded');
        const inst = new FFmpegCtor();
        const coreBase = 'https://unpkg.com/@ffmpeg/core-mt@0.12.6/dist/umd';
        // The classWorkerURL points to ffmpeg.wasm's own internal Worker chunk
        // (814.ffmpeg.js for 0.12.10). Under COEP: require-corp, the Worker
        // constructor blocks cross-origin scripts — route it through a Blob URL.
        const ffmpegBase = 'https://unpkg.com/@ffmpeg/ffmpeg@0.12.10/dist/umd';
        const toBlobURL = (window.FFmpegUtil && window.FFmpegUtil.toBlobURL) || window.toBlobURL;
        if (!toBlobURL) throw new Error('ffmpeg-util not loaded');
        await inst.load({
          classWorkerURL: await toBlobURL(ffmpegBase + '/814.ffmpeg.js', 'text/javascript'),
          coreURL: await toBlobURL(coreBase + '/ffmpeg-core.js', 'text/javascript'),
          wasmURL: await toBlobURL(coreBase + '/ffmpeg-core.wasm', 'application/wasm'),
          workerURL: await toBlobURL(coreBase + '/ffmpeg-core.worker.js', 'text/javascript'),
        });
        ffmpegInstance = inst;
        return inst;
      })();
      try {
        return await ffmpegLoading;
      } catch (err) {
        ffmpegLoading = null;
        throw err;
      }
    }

    // Lossless trim via stream-copy. Returns { bytes, mime, ext }.
    async function buildTrimmedClip(start, end) {
      if (!currentSourceBytes || !currentSourceExt) {
        throw new Error('Original audio bytes not loaded');
      }
      const ff = await getFfmpeg();
      const ext = currentSourceExt;
      const inputName = 'input.' + ext;
      const outputName = 'output.' + ext;
      await ff.writeFile(inputName, currentSourceBytes);
      const args = [
        '-ss', String(start),
        '-to', String(end),
        '-i', inputName,
        '-c', 'copy',
        '-y',
        outputName,
      ];
      const code = await ff.exec(args);
      if (code !== 0) {
        try { await ff.deleteFile(inputName); } catch (_) {}
        throw new Error('ffmpeg trim failed (exit ' + code + ')');
      }
      const out = await ff.readFile(outputName);
      try { await ff.deleteFile(inputName); } catch (_) {}
      try { await ff.deleteFile(outputName); } catch (_) {}
      return { bytes: out, mime: currentSourceMime || 'audio/mpeg', ext };
    }

    const trackSelect = document.getElementById('track-select');
    const btnPreview = document.getElementById('btn-preview');
    const btnStop = document.getElementById('btn-stop');
    const btnDownload = document.getElementById('btn-download');
    const btnUpload = document.getElementById('btn-upload');
    const uploadModal = document.getElementById('upload-modal');
    const uploadAuthor = document.getElementById('upload-author');
    const uploadName = document.getElementById('upload-name');
    const uploadCancel = document.getElementById('upload-cancel');
    const uploadConfirm = document.getElementById('upload-confirm');
    const timeStart = document.getElementById('time-start');
    const timeEnd = document.getElementById('time-end');
    const timeSelection = document.getElementById('time-selection');
    const statusMsg = document.getElementById('status-msg');
    const infoText = document.getElementById('info-text');
    const waveformLoading = document.getElementById('waveform-loading');

    function formatTime(sec) {
      const m = Math.floor(sec / 60);
      const s = Math.floor(sec % 60);
      const ms = Math.floor((sec % 1) * 10);
      return String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0') + '.' + ms;
    }

    function showStatus(msg, type) {
      statusMsg.textContent = msg;
      statusMsg.className = 'status ' + type;
      if (type === 'success' || type === 'info') {
        setTimeout(() => { statusMsg.className = 'status'; }, 5000);
      }
    }

    function updateTimesFromRegion() {
      if (!activeRegion) return;
      timeStart.value = formatTime(activeRegion.start);
      timeEnd.value = formatTime(activeRegion.end);
      timeSelection.textContent = formatTime(activeRegion.end - activeRegion.start);
    }

    function parseTime(str) {
      const match = str.trim().match(/^(\d+):(\d{2})\.(\d)$/);
      if (!match) return null;
      return parseInt(match[1], 10) * 60 + parseInt(match[2], 10) + parseInt(match[3], 10) / 10;
    }

    function applyTimeInput(isStart) {
      if (!activeRegion || !wavesurfer) return;
      const input = isStart ? timeStart : timeEnd;
      const secs = parseTime(input.value);
      if (secs === null) {
        updateTimesFromRegion();
        return;
      }
      const duration = wavesurfer.getDuration();
      if (isStart) {
        const newStart = Math.max(0, Math.min(secs, activeRegion.end - 0.1));
        activeRegion.setOptions({ start: newStart });
      } else {
        const newEnd = Math.max(activeRegion.start + 0.1, Math.min(secs, duration));
        activeRegion.setOptions({ end: newEnd });
      }
      updateTimesFromRegion();
    }

    function deriveTrackLabel(filename) {
      // mixed_2024-01-15_14-30-45.mp3 → "🎵 Mixed Audio"
      // friend1_2024-01-15_14-30-45.mp3 → "🎤 Friend1"
      const name = filename.replace(/\.mp3$/i, '');
      // Remove timestamp suffix (_YYYY-MM-DD_HH-MM-SS)
      const cleaned = name.replace(/_\d{4}-\d{2}-\d{2}_\d{2}-\d{2}-\d{2}$/, '');
      if (cleaned.toLowerCase() === 'mixed') {
        return '🎵 Mixed Audio';
      }
      // Replace underscores with spaces and capitalize
      const display = cleaned.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
      return '🎤 ' + display;
    }

    async function init() {
      const hash = window.location.hash.substring(1);
      if (!hash) {
        infoText.textContent = 'No clip data found. Use the Editor button from a clip message.';
        return;
      }

      try {
        const decoded = JSON.parse(atob(hash.replace(/-/g, '+').replace(/_/g, '/')));
        clipChannelId = decoded.c;
        clipMessageId = decoded.m;
        clipSignature = decoded.s || null;

        if (!clipChannelId || !clipMessageId) {
          infoText.textContent = 'Invalid clip data.';
          return;
        }

        infoText.textContent = 'Fetching clip data from Discord...';

        let apiUrl = '/api/message?c=' + clipChannelId + '&m=' + clipMessageId;
        if (clipSignature) apiUrl += '&s=' + encodeURIComponent(clipSignature);
        const resp = await fetch(apiUrl);
        if (!resp.ok) {
          const err = await resp.json().catch(() => ({}));
          infoText.textContent = err.error || 'Failed to fetch clip data.';
          return;
        }

        const data = await resp.json();
        if (!data.attachments || data.attachments.length === 0) {
          infoText.textContent = 'No audio tracks found in this clip.';
          return;
        }

        // Prefer a ZIP attachment if present (new clip format). Fall back to per-track
        // audio attachments for legacy clip messages.
        const zipAttachment = data.attachments.find(a => /\.zip$/i.test(a.filename));

        if (zipAttachment) {
          infoText.textContent = 'Downloading clip bundle...';
          try {
            let zipProxyUrl = '/api/proxy?c=' + encodeURIComponent(clipChannelId) +
              '&m=' + encodeURIComponent(clipMessageId) +
              '&f=' + encodeURIComponent(zipAttachment.filename);
            if (clipSignature) zipProxyUrl += '&s=' + encodeURIComponent(clipSignature);

            const zr = await fetch(zipProxyUrl);
            if (!zr.ok) throw new Error('Bundle fetch HTTP ' + zr.status);
            const zipBuf = await zr.arrayBuffer();
            const zip = await window.JSZip.loadAsync(zipBuf);

            const entries = [];
            zip.forEach((relPath, entry) => {
              if (!entry.dir) entries.push(entry);
            });
            // Sort: mixed_* first, then alphabetical.
            entries.sort((a, b) => {
              const aMixed = /^mixed[_.]/i.test(a.name) ? 0 : 1;
              const bMixed = /^mixed[_.]/i.test(b.name) ? 0 : 1;
              if (aMixed !== bMixed) return aMixed - bMixed;
              return a.name.localeCompare(b.name);
            });

            const extToMime = { mp3: 'audio/mpeg', wav: 'audio/wav', ogg: 'audio/ogg', m4a: 'audio/mp4' };
            tracks = [];
            for (const entry of entries) {
              const bytes = new Uint8Array(await entry.async('uint8array'));
              const m = entry.name.match(/\.([a-zA-Z0-9]+)$/);
              const ext = m ? m[1].toLowerCase() : 'mp3';
              tracks.push({
                label: deriveTrackLabel(entry.name),
                filename: entry.name,
                bytes,
                mime: extToMime[ext] || 'audio/mpeg',
                ext,
              });
            }

            if (tracks.length === 0) {
              infoText.textContent = 'Clip bundle is empty.';
              return;
            }
          } catch (err) {
            console.error('Bundle unzip error:', err);
            infoText.textContent = 'Failed to unpack clip bundle.';
            return;
          }
        } else {
          tracks = data.attachments
            .filter(a => /\.(mp3|wav|ogg|m4a)$/i.test(a.filename))
            .map(a => ({
              label: deriveTrackLabel(a.filename),
              url: a.url,
              filename: a.filename,
            }));
          if (tracks.length === 0) {
            infoText.textContent = 'No audio tracks found in this clip.';
            return;
          }
        }

        // Populate track selector
        trackSelect.innerHTML = '';
        tracks.forEach((t, i) => {
          const opt = document.createElement('option');
          opt.value = String(i);
          opt.textContent = t.label;
          trackSelect.appendChild(opt);
        });
        trackSelect.disabled = false;

        infoText.textContent = 'Select a track and use the waveform to set trim points.';
        loadTrack(0);
      } catch (err) {
        console.error('Init error:', err);
        infoText.textContent = 'Failed to load clip data.';
      }
    }

    function loadTrack(index) {
      const track = tracks[index];
      if (!track) return;

      waveformLoading.style.display = 'block';
      btnPreview.disabled = true;
      btnStop.disabled = true;
      btnDownload.disabled = true;
      btnUpload.disabled = true;
      currentAudioBuffer = null;
      currentSourceBytes = null;
      currentSourceMime = null;
      currentSourceExt = null;

      if (wavesurfer) {
        wavesurfer.destroy();
      }
      if (currentBlobUrl) {
        URL.revokeObjectURL(currentBlobUrl);
        currentBlobUrl = null;
      }

      regionsPlugin = WaveSurfer.Regions.create();

      wavesurfer = WaveSurfer.create({
        container: '#waveform',
        waveColor: '#3a3a6a',
        progressColor: '#5865f2',
        cursorColor: '#ffffff44',
        height: 128,
        barWidth: 2,
        barGap: 1,
        barRadius: 2,
        plugins: [regionsPlugin],
      });

      if (track.bytes) {
        // New ZIP-sourced track: bytes are already in memory.
        currentSourceBytes = track.bytes;
        currentSourceMime = track.mime || 'audio/mpeg';
        currentSourceExt = track.ext || 'mp3';
        const blob = new Blob([track.bytes], { type: currentSourceMime });
        currentBlobUrl = URL.createObjectURL(blob);
        wavesurfer.load(currentBlobUrl);
      } else {
        // Legacy: fetch via proxy and grab bytes in parallel for export.
        let proxyUrl = '/api/proxy?c=' + encodeURIComponent(clipChannelId) + '&m=' + encodeURIComponent(clipMessageId) + '&f=' + encodeURIComponent(track.filename);
        if (clipSignature) proxyUrl += '&s=' + encodeURIComponent(clipSignature);
        wavesurfer.load(proxyUrl);

        (async () => {
          try {
            const r = await fetch(proxyUrl);
            if (!r.ok) throw new Error('HTTP ' + r.status);
            const ct = r.headers.get('Content-Type') || 'audio/mpeg';
            const buf = await r.arrayBuffer();
            const m = (track.filename || '').match(/\.([a-zA-Z0-9]+)$/);
            let ext = m ? m[1].toLowerCase() : null;
            if (!ext) {
              if (ct.includes('mpeg')) ext = 'mp3';
              else if (ct.includes('ogg')) ext = 'ogg';
              else if (ct.includes('mp4')) ext = 'm4a';
              else if (ct.includes('wav')) ext = 'wav';
              else ext = 'mp3';
            }
            currentSourceBytes = new Uint8Array(buf);
            currentSourceMime = ct;
            currentSourceExt = ext;
          } catch (err) {
            console.error('Source-byte fetch failed:', err);
            showStatus('Failed to load original audio for export.', 'error');
          }
        })();
      }

      wavesurfer.on('ready', () => {
        waveformLoading.style.display = 'none';
        const duration = wavesurfer.getDuration();

        activeRegion = regionsPlugin.addRegion({
          start: 0,
          end: duration,
          color: 'rgba(88, 101, 242, 0.2)',
          drag: false,
          resize: true,
        });

        updateTimesFromRegion();
        btnPreview.disabled = false;
        btnStop.disabled = false;
        btnDownload.disabled = false;
        btnUpload.disabled = false;

        // Store decoded audio buffer for WAV export
        currentAudioBuffer = wavesurfer.getDecodedData();
      });

      regionsPlugin.on('region-updated', (region) => {
        activeRegion = region;
        updateTimesFromRegion();
      });

      wavesurfer.on('error', (err) => {
        waveformLoading.style.display = 'none';
        showStatus('Failed to load audio. Discord CDN URL may have expired.', 'error');
      });
    }

    function addTimeInputListeners(input, isStart) {
      input.addEventListener('blur', () => applyTimeInput(isStart));
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') { e.preventDefault(); applyTimeInput(isStart); input.blur(); }
        if (e.key === 'Escape') { updateTimesFromRegion(); input.blur(); }
      });
    }

    addTimeInputListeners(timeStart, true);
    addTimeInputListeners(timeEnd, false);

    trackSelect.addEventListener('change', () => {
      loadTrack(parseInt(trackSelect.value, 10));
    });

    btnPreview.addEventListener('click', () => {
      if (!activeRegion || !wavesurfer) return;
      wavesurfer.play(activeRegion.start, activeRegion.end);
    });

    btnStop.addEventListener('click', () => {
      if (wavesurfer) wavesurfer.stop();
    });

    btnDownload.addEventListener('click', async () => {
      if (!activeRegion || !currentSourceBytes) {
        showStatus('No audio loaded.', 'error');
        return;
      }
      if (activeRegion.end - activeRegion.start <= 0) {
        showStatus('Invalid selection.', 'error');
        return;
      }

      btnDownload.disabled = true;
      showStatus(ffmpegInstance ? 'Trimming…' : 'Loading audio engine…', 'info');

      try {
        const { bytes, mime, ext } = await buildTrimmedClip(activeRegion.start, activeRegion.end);
        const blob = new Blob([bytes], { type: mime });
        const url = URL.createObjectURL(blob);
        const trackName = tracks[parseInt(trackSelect.value, 10)]?.filename || 'clip';
        const baseName = trackName.replace(/\.[^.]+$/, '');
        const a = document.createElement('a');
        a.href = url;
        a.download = 'trimmed_' + baseName + '.' + ext;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        showStatus('Download started!', 'success');
      } catch (err) {
        console.error('Export error:', err);
        showStatus('Failed to export audio: ' + (err && err.message ? err.message : 'unknown error'), 'error');
      }

      btnDownload.disabled = false;
    });

    // Upload flow
    btnUpload.addEventListener('click', () => {
      uploadModal.classList.add('active');
      uploadAuthor.focus();
    });

    uploadCancel.addEventListener('click', () => {
      uploadModal.classList.remove('active');
    });

    uploadModal.addEventListener('click', (e) => {
      if (e.target === uploadModal) uploadModal.classList.remove('active');
    });

    uploadConfirm.addEventListener('click', async () => {
      const author = uploadAuthor.value.trim();
      const name = uploadName.value.trim();

      if (!author || !name) {
        showStatus('Please fill in both Author and Sound Name.', 'error');
        return;
      }

      if (!activeRegion || !currentSourceBytes) {
        showStatus('No audio loaded.', 'error');
        return;
      }
      if (activeRegion.end - activeRegion.start <= 0) {
        showStatus('Invalid selection.', 'error');
        return;
      }

      uploadConfirm.disabled = true;
      uploadModal.classList.remove('active');
      showStatus(ffmpegInstance ? 'Trimming…' : 'Loading audio engine…', 'info');

      try {
        const { bytes, mime, ext } = await buildTrimmedClip(activeRegion.start, activeRegion.end);

        // Convert to base64 in chunks to avoid call-stack overflow on large clips.
        let binary = '';
        const CHUNK = 0x8000;
        for (let i = 0; i < bytes.length; i += CHUNK) {
          binary += String.fromCharCode.apply(null, bytes.subarray(i, i + CHUNK));
        }
        const audioBase64 = btoa(binary);

        showStatus('Uploading sound...', 'info');

        let uploadUrl = '/api/upload?c=' + encodeURIComponent(clipChannelId) + '&m=' + encodeURIComponent(clipMessageId);
        if (clipSignature) uploadUrl += '&s=' + encodeURIComponent(clipSignature);

        const resp = await fetch(uploadUrl, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ author, soundName: name, audioBase64, mime, ext }),
        });

        const data = await resp.json();
        if (!resp.ok) {
          showStatus(data.error || 'Upload failed.', 'error');
        } else {
          showStatus('Sound uploaded as: ' + (data.fileName || name), 'success');
          uploadAuthor.value = '';
          uploadName.value = '';
        }
      } catch (err) {
        console.error('Upload error:', err);
        showStatus('Failed to upload sound: ' + (err && err.message ? err.message : 'unknown error'), 'error');
      }

      uploadConfirm.disabled = false;
    });

    init();
  </script>
</body>
</html>
