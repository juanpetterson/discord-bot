version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - ./src/assets/uploads:/app/src/assets/uploads
      - ./src/assets/gifs:/app/src/assets/gifs
      # Mount the whole data folder so all JSON state (bets, quotes, players,
      # join-sounds, polling-state, dota-nicks, etc.) persists across deploys.
      # Avoids the "file mounted before it exists → Docker creates a directory"
      # trap that silently broke individual-file mounts.
      - ./src/assets/data:/app/src/assets/data
    env_file:
      - .env
    command: ["npm", "run", "start"]
    restart: on-failure